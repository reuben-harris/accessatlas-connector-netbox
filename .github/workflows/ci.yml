name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --dev
      - name: Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Pytest
        run: uv run pytest
